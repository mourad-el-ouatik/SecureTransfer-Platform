<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: auto;">
  <h2 style="color: #0066cc;">Confirmation de transaction</h2>
  <p>Votre transaction a ete traitee avec succes.</p>
  <table style="width:100%; border-collapse: collapse;">
    <tr style="background:#f0f0f0;"><td style="padding:8px;"><b>N Transaction</b></td><td style="padding:8px;" th:text="${transactionId}"></td></tr>
    <tr><td style="padding:8px;"><b>Type</b></td><td style="padding:8px;" th:text="${type}"></td></tr>
    <tr style="background:#f0f0f0;"><td style="padding:8px;"><b>Montant</b></td><td style="padding:8px;" th:text="${amount} + ' MAD'"></td></tr>
    <tr><td style="padding:8px;"><b>Frais</b></td><td style="padding:8px;" th:text="${fee} + ' MAD'"></td></tr>
    <tr style="background:#f0f0f0;"><td style="padding:8px;"><b>Statut</b></td><td style="padding:8px;" th:text="${status}"></td></tr>
    <tr th:if="${withdrawalCode != null}"><td style="padding:8px;"><b>Code retrait</b></td><td style="padding:8px;" th:text="${withdrawalCode}"></td></tr>
  </table>
  <p style="color:#999; font-size:12px;">SecureTransfer Platform — Ne pas repondre a cet email.</p>
</body>
</html>
