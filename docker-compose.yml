services:
  postgres:
    image: postgres:16-alpine
    container_name: securetransfer-postgres
    environment:
      POSTGRES_DB: securetransfer
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin@2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: securetransfer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: